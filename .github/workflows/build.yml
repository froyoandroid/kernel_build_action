# A simple action usage
name: Build Kernel
on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Build Kernel
        uses: froyoandroid/kernel_build_action@main
        with:
          kernel-url: https://gitlab.com/firenza20/kernel-chopin
          kernel-branch: refactor
          config: chopin_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: false
          disable-lto: true
          anykernel3: true
          anykernel3-url: https://github.com/froyoandroid/AnyKernel3
